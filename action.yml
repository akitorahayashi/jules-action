name: jules-action
description: Create a Jules session from workflow inputs
inputs:
  prompt:
    description: Prompt to start the Jules session
    required: true
  source:
    description: Source resource name in the form sources/{source}
    required: false
  starting-branch:
    description: Branch name to start the session from; defaults to current workflow branch
    required: false
  title:
    description: Optional session title
    required: false
  require-plan-approval:
    description: Optional boolean; true requires plan approval before execution
    required: false
    default: "true"
  automation-mode:
    description: Optional automation mode enum (AUTOMATION_MODE_UNSPECIFIED or AUTO_CREATE_PR)
    required: false
    default: AUTO_CREATE_PR
outputs:
  session-name:
    description: Created session resource name
  session-id:
    description: Created session identifier
  resolved-source:
    description: Source used for session creation
  session-title:
    description: Created session title
  session-state:
    description: Current session state
  session-url:
    description: URL to view the session in Jules web app
runs:
  using: node24
  main: dist/index.js
